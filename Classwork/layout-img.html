<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>layout</title>
    <style>
        .container{
            background-color: aqua;
            padding: 50px;
            max-width:fit-content;
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap: 10px;
        }

        .img-1,.img-2,.img-3,.img-4,.img-5,.img-6{
            border-radius: 5px;
            overflow: hidden;
        }

        .img-1 img, .img-2 img, .img-3 img, .img-4 img, .img-5 img, .img-6 img {
            display: block;
            width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="img-1"><img src="https://images.unsplash.com/photo-1585076641399-5c06d1b3365f?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTB8fGh0bWx8ZW58MHx8MHx8fDA%3D" alt=""></div>
        <div class="img-2"><img src="https://plus.unsplash.com/premium_photo-1661331911412-330f2e99cf53?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8OXx8aHRtbHxlbnwwfHwwfHx8MA%3D%3D" alt=""></div>
        <div class="img-3"><img src="https://images.unsplash.com/photo-1583339793403-3d9b001b6008?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTF8fGh0bWx8ZW58MHx8MHx8fDA%3D" alt=""></div>
        <div class="img-4"><img src="https://images.unsplash.com/photo-1621839673705-6617adf9e890?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8aHRtbHxlbnwwfHwwfHx8MA%3D%3D" alt=""></div>
        <div class="img-5"><img src="https://images.unsplash.com/photo-1632882765546-1ee75f53becb?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8NHx8aHRtbHxlbnwwfHwwfHx8MA%3D%3D" alt=""></div>
        <div class="img-6"><img src="https://images.unsplash.com/photo-1669023414166-a4cc7c0fe1f5?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8OHx8aHRtbHxlbnwwfHwwfHx8MA%3D%3D" alt=""></div>
    </div>
</body>
</html>
